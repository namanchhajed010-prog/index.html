<!DOCTYPE html>
<html>
<head>
  <title>Incoming Call</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }
    #callScreen {
      margin-top: 100px;
    }
    .btn {
      padding: 15px 25px;
      margin: 20px;
      font-size: 18px;
      border-radius: 50px;
      border: none;
    }
    .accept {
      background: green;
      color: white;
    }
    .reject {
      background: red;
      color: white;
    }
    video {
      width: 100%;
      height: 100vh;
      display: none;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div id="callScreen">
  <h2>📹 Incoming Video Call</h2>
  <h1>Priya ❤️</h1>
  <p>Calling...</p>

  <button class="btn accept" onclick="acceptCall()">Accept</button>
  <button class="btn reject" onclick="rejectCall()">Reject</button>
</div>

<video id="video" src="https://www.w3schools.com/html/mov_bbb.mp4"></video>

<audio id="ringtone" loop>
  <source src="https://www.soundjay.com/phone/phone-ring-01a.mp3">
</audio>

<script>
let ringtone = document.getElementById("ringtone");

// play ringtone
setTimeout(() => {
  ringtone.play();
  navigator.vibrate([300, 200, 300]);
}, 500);

function acceptCall() {
  document.getElementById("callScreen").style.display = "none";
  let video = document.getElementById("video");
  video.style.display = "block";
  video.play();
  ringtone.pause();

  setTimeout(() => {
    document.body.innerHTML = "<h1>😂 Bro no girl is calling you!</h1><p>Got pranked 😎</p>";
  }, 5000);
}

function rejectCall() {
  ringtone.pause();
  document.body.innerHTML = "<h1>Missed Call 😢</h1>";
}
</script>

</body>
</html>
